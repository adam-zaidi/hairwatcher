name: HairWatcher
options:
  bundleIdPrefix: com.hairwatcher
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: HMUBZWLS74
    DEAD_CODE_STRIPPING: YES
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
targets:
  HairWatcher:
    type: application
    platform: macOS
    sources:
      - path: HairWatcher
        excludes:
          - "Info.plist"
          - "HairWatcher.entitlements"
    info:
      path: HairWatcher/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        NSCameraUsageDescription: "HairWatcher uses your camera locally to detect when you're touching your hair or face. Video frames never leave your Mac."
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026"
    entitlements:
      path: HairWatcher/HairWatcher.entitlements
      properties:
        # Privacy invariant: no network or file-access entitlements. Camera
        # frames are processed locally in memory and must not be uploaded.
        com.apple.security.app-sandbox: true
        com.apple.security.device.camera: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hairwatcher.HairWatcher
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
